services:
  # 1. База користувачів
  user_db:
    image: postgres:15-alpine
    container_name: user_db_container
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Сервіс користувачів
  user_service:
    build: ./user_service
    container_name: user_service_app
    ports:
      - "8000:8000"
    depends_on:
      user_db:
        condition: service_healthy
    volumes:
      - ./user_service:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user_admin:secret_password@user_db:5432/user_db

  # 3. Сховище файлів (MinIO) - ЗМІНИЛИ НАЗВУ СЕРВІСУ ТУТ
  minio-storage:
    image: minio/minio
    container_name: minio_storage_app
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. База для метаданих файлів
  storage_db:
    image: postgres:15-alpine
    container_name: storage_db_container
    environment:
      POSTGRES_USER: storage_admin
      POSTGRES_PASSWORD: storage_pass
      POSTGRES_DB: storage_db
    ports:
      - "5433:5432"
    volumes:
      - storage_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_admin -d storage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 5. Сервіс для роботи з файлами
  storage_service:
    build: ./storage_service
    container_name: storage_service_app
    ports:
      - "8001:8001"
    depends_on:
      storage_db:
        condition: service_healthy
      minio-storage: # ПЕРЕВІР, ЩО ТУТ ТАКЕ Ж ІМ'Я ЯК ВИЩЕ
        condition: service_healthy
    volumes:
      - ./storage_service:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://storage_admin:storage_pass@storage_db:5432/storage_db
      - MINIO_ENDPOINT=minio-storage:9000 # ТЕПЕР ХОСТ ВАЛІДНИЙ ДЛЯ S3
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123  

  # База даних для чатів
  chat_mongodb:
    image: mongo:latest
    container_name: chat_mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password

  chat_service:
    build: ./chat_service
    container_name: chat_service_app
    ports:
      - "8002:8002"
    depends_on:
      - chat_mongodb
    volumes:
      - ./chat_service:/app
    environment:
      - MONGO_URL=mongodb://admin:mongo_password@chat_mongodb:27017
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload 

  # База даних для задач
  task_db:
    image: postgres:15-alpine
    container_name: task_db_container
    environment:
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_pass
      POSTGRES_DB: task_db
    ports:
      - "5435:5432"
    volumes:
      - task_db_data:/var/lib/postgresql/data
    # ДОДАЄМО ЦЕЙ БЛОК:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Сервіс задач
  task_manager_service:
    build: ./task_manager_service
    container_name: task_manager_app
    ports:
      - "8003:8003"
    # ОНОВЛЮЄМО ЗАЛЕЖНІСТЬ:
    depends_on:
      task_db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://task_user:task_pass@task_db:5432/task_db
    volumes:
      - ./task_manager_service:/app  

  notification_db:
    image: postgres:15-alpine
    container_name: notification_db_container
    environment:
      POSTGRES_USER: notify_user
      POSTGRES_PASSWORD: notify_pass
      POSTGRES_DB: notify_db
    ports:
      - "5436:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_user -d notify_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification_service:
    build: ./notification_service
    container_name: notification_app
    ports:
      - "8004:8004"
    depends_on:
      notification_db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://notify_user:notify_pass@notification_db:5432/notify_db
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASS=your_app_password
    volumes:
      - ./notification_service:/app

volumes:
  user_db_data:
  storage_db_data:
  minio_data:
  mongodb_data:
  task_db_data:
  notification_db_data: